[book]
title = "IBX"
description = "Direct IB connection engine — Rust + Python."
authors = ["IBX contributors"]
language = "en"
src = "src"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/deepentropy/ibx"
edit-url-template = "https://github.com/deepentropy/ibx/edit/main/docs/book/{path}"
no-section-label = true
additional-css = ["theme/custom.css"]

[output.html.fold]
enable = true
level = 1

[output.html.playground]
runnable = false
